<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - DEBUG</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #0f0; }
h1 { color: #fff; }
.log { background: #000; padding: 10px; margin: 5px 0; font-size: 12px; max-height: 400px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff; }
th, td { padding: 8px; border: 1px solid #444; text-align: left; font-size: 12px; }
th { background: #333; }
.stat { display: inline-block; background: #333; padding: 15px 25px; margin: 5px; border-radius: 6px; color: #fff; }
.stat .num { font-size: 32px; font-weight: bold; color: #4af; }
.stat .label { font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<h1>🔍 Admin Panel - DEBUG MODE (FIXED)</h1>
<p style="color:#aaa;">URL trim ho gaya hai. Ab test ho raha hai...</p>

<div id="debugLog" class="log"></div>
<div id="stats"></div>
<div id="data"></div>

<script>
// ⚠️ IMPORTANT: URLs ko .trim() kiya hai - invisible characters hat jayenge
const RAW_URL = 'https://uegdizdnminwhkxcdcle.supabase.co';
const RAW_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZ2RpemRubWlud2hreGNkY2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODk2MjgsImV4cCI6MjA5NzY2NTYyOH0.2wiAHbaoNoDva_tRseDAywVMu_6AioCGlVLgoVb0d6s';

// Trim all whitespace and invisible characters
const URL = RAW_URL.trim().replace(/[\u200B-\u200D\uFEFF]/g, '');
const KEY = RAW_KEY.trim().replace(/[\u200B-\u200D\uFEFF]/g, '');

function log(msg, type = 'info') {
  const box = document.getElementById('debugLog');
  const time = new Date().toLocaleTimeString();
  const color = type === 'error' ? '#f88' : type === 'success' ? '#8f8' : type === 'warn' ? '#ff8' : '#8cf';
  box.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

async function test() {
  log('🚀 Starting debug test...');
  log(`📏 URL length: ${URL.length} chars`);
  log(`📏 KEY length: ${KEY.length} chars`);
  log(`🔗 URL: "${URL}"`);
  
  // Check URL format
  if (!URL.startsWith('https://')) {
    log('❌ URL does not start with https://', 'error');
    return;
  }
  if (!URL.includes('.supabase.co')) {
    log('❌ URL does not contain .supabase.co', 'error');
    return;
  }
  log('✅ URL format looks good');
  
  // Check SDK
  if (typeof supabase === 'undefined') {
    log('❌ Supabase SDK NOT loaded!', 'error');
    return;
  }
  log('✅ Supabase SDK loaded');
  
  // Create client
  let db;
  try {
    db = supabase.createClient(URL, KEY);
    log('✅ Client created successfully!');
  } catch (e) {
    log('❌ Client creation failed: ' + e.message, 'error');
    log('💡 Try typing URL manually instead of copy-paste', 'warn');
    return;
  }
  
  // Test query
  log('🔄 Testing SELECT query...');
  const startTime = Date.now();
  
  const { data, error, count, status } = await db
    .from('analytics_sessions')
    .select('*', { count: 'exact' })
    .limit(5);
  
  const timeTaken = Date.now() - startTime;
  
  if (error) {
    log('❌ Query FAILED!', 'error');
    log('Error: ' + error.message, 'error');
    log('Details: ' + JSON.stringify(error), 'error');
    log('Time: ' + timeTaken + 'ms', 'warn');
    return;
  }
  
  log(`✅ Query SUCCESS in ${timeTaken}ms`, 'success');
  log(`📊 Total sessions: ${count}`, 'success');
  
  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${count || 0}</div><div class="label">Total Sessions</div></div>
    <div class="stat"><div class="num">${timeTaken}ms</div><div class="label">Query Time</div></div>
  `;
  
  // Test all tables
  log('🔄 Testing all tables...');
  const tables = [
    'analytics_sessions',
    'analytics_page_views', 
    'analytics_clicks',
    'analytics_events',
    'analytics_errors',
    'analytics_performance'
  ];
  
  let html = '<h2 style="color:#fff;margin-top:20px;">📋 Table Status</h2><table><tr><th>Table</th><th>Count</th><th>Status</th><th>Time</th></tr>';
  
  for (const table of tables) {
    const t1 = Date.now();
    const { data: d, error: e, count: c } = await db.from(table).select('*', { count: 'exact', head: true });
    const t2 = Date.now() - t1;
    
    if (e) {
      html += `<tr><td>${table}</td><td>-</td><td style="color:#f88;">❌ ${e.message}</td><td>${t2}ms</td></tr>`;
    } else {
      html += `<tr><td>${table}</td><td>${c || 0}</td><td style="color:#8f8;">✅ OK</td><td>${t2}ms</td></tr>`;
      log(`✅ ${table}: ${c || 0} rows (${t2}ms)`, 'success');
    }
  }
  html += '</table>';
  
  // Show sample data
  if (data && data.length > 0) {
    html += '<h2 style="color:#fff;margin-top:20px;">👥 Latest Sessions</h2><table><tr><th>Session ID</th><th>Device</th><th>Browser</th><th>OS</th><th>Time</th></tr>';
    data.forEach(s => {
      html += `<tr>
        <td>${s.session_id?.substring(0, 15)}...</td>
        <td>${s.device_type || '-'}</td>
        <td>${s.browser || '-'}</td>
        <td>${s.os || '-'}</td>
        <td>${new Date(s.started_at).toLocaleString()}</td>
      </tr>`;
    });
    html += '</table>';
  }
  
  document.getElementById('data').innerHTML = html;
  log('✅ Debug complete!', 'success');
}

test();
</script>

</body>
</html>
